apiVersion: apps/v1
kind: Deployment
metadata:
  name: cloudpulse-ai-service
  namespace: prod
  labels:
    app: cloudpulse-ai-service
    environment: prod

spec:
  replicas: 2

  selector:
    matchLabels:
      app: cloudpulse-ai-service

  template:
    metadata:
      labels:
        app: cloudpulse-ai-service
        environment: prod

    spec:
      containers:
        - name: ai-service

          image: cloudpulseacr12345.azurecr.io/cloudpulse-ai-service:prod
          imagePullPolicy: Always

          ports:
            - containerPort: 8000

          envFrom:
            - configMapRef:
                name: cloudpulse-config
            - secretRef:
                name: cloudpulse-secret

          readinessProbe:
            httpGet:
              path: /health
              port: 8000
            initialDelaySeconds: 10
            periodSeconds: 10

          livenessProbe:
            httpGet:
              path: /health
              port: 8000
            initialDelaySeconds: 20
            periodSeconds: 20

          resources:
            requests:
              cpu: "100m"
              memory: "128Mi"

            limits:
              cpu: "300m"
              memory: "256Mi"