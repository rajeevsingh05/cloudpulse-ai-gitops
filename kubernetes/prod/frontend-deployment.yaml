apiVersion: apps/v1
kind: Deployment
metadata:
  name: cloudpulse-frontend
  namespace: prod
  labels:
    app: cloudpulse-frontend
    environment: prod

spec:
  replicas: 2

  selector:
    matchLabels:
      app: cloudpulse-frontend

  template:
    metadata:
      labels:
        app: cloudpulse-frontend
        environment: prod

    spec:
      containers:
        - name: frontend

          image: cloudpulseacr12345.azurecr.io/cloudpulse-frontend:prod
          imagePullPolicy: Always

          ports:
            - containerPort: 80

          envFrom:
            - configMapRef:
                name: cloudpulse-config

          readinessProbe:
            httpGet:
              path: /
              port: 80
            initialDelaySeconds: 10
            periodSeconds: 10

          livenessProbe:
            httpGet:
              path: /
              port: 80
            initialDelaySeconds: 20
            periodSeconds: 20

          resources:
            requests:
              cpu: "100m"
              memory: "128Mi"

            limits:
              cpu: "300m"
              memory: "256Mi"