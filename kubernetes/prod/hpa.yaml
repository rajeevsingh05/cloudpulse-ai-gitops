apiVersion: autoscaling/v2
kind: HorizontalPodAutoscaler
metadata:
  name: cloudpulse-backend-hpa
  namespace: prod

spec:
  scaleTargetRef:
    apiVersion: apps/v1
    kind: Deployment
    name: cloudpulse-backend

  minReplicas: 2
  maxReplicas: 5

  metrics:
    - type: Resource
      resource:
        name: cpu
        target:
          type: Utilization
          averageUtilization: 70

---
apiVersion: autoscaling/v2
kind: HorizontalPodAutoscaler
metadata:
  name: cloudpulse-ai-service-hpa
  namespace: prod

spec:
  scaleTargetRef:
    apiVersion: apps/v1
    kind: Deployment
    name: cloudpulse-ai-service

  minReplicas: 2
  maxReplicas: 5

  metrics:
    - type: Resource
      resource:
        name: cpu
        target:
          type: Utilization
          averageUtilization: 70