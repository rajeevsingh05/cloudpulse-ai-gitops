apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: cloudpulse-dev
  namespace: argocd
spec:
  project: default
  source:
    repoURL: https://github.com/rajeevsingh05/cloudpulse-ai-gitops.git
    targetRevision: develop
    path: helm/cloudpulse
    helm:
      valueFiles:
        - values-dev.yaml
  destination:
    server: https://kubernetes.default.svc
    namespace: dev
  syncPolicy:
    automated:
      prune: true
      selfHeal: true
