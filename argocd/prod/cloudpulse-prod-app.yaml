apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: cloudpulse-prod
  namespace: argocd
spec:
  project: default
  source:
    repoURL: https://github.com/rajeevsingh05/cloudpulse-ai-gitops.git
    targetRevision: main
    path: helm/cloudpulse
    helm:
      valueFiles:
        - values-prod.yaml
  destination:
    server: https://kubernetes.default.svc
    namespace: prod
  syncPolicy:
    automated:
      prune: true
      selfHeal: true
