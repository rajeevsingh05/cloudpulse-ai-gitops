apiVersion: monitoring.coreos.com/v1
kind: ServiceMonitor
metadata:
  name: cloudpulse-backend
  namespace: monitoring
spec:
  namespaceSelector:
    matchNames:
      - dev
      - prod
  selector:
    matchLabels:
      app: cloudpulse-backend
  endpoints:
    - port: http
      path: /actuator/prometheus
      interval: 15s
      