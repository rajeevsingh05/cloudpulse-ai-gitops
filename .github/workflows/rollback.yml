name: Rollback Deployment

on:
  workflow_dispatch:
    inputs:
      environment:
        description: "Environment to rollback"
        required: true
        type: choice
        options:
          - dev
          - prod
      service:
        description: "Service to rollback"
        required: true
        type: choice
        options:
          - frontend
          - backend
          - aiService
      image_tag:
        description: "Previous stable image tag"
        required: true

permissions:
  contents: write

jobs:
  rollback:
    name: Rollback selected service
    runs-on: self-hosted

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Update image tag in Helm values
        run: |
          VALUES_FILE="helm/cloudpulse/values-${{ github.event.inputs.environment }}.yaml"
          SERVICE="${{ github.event.inputs.service }}"
          TAG="${{ github.event.inputs.image_tag }}"

          if [ ! -f "$VALUES_FILE" ]; then
            echo "File not found: $VALUES_FILE"
            exit 1
          fi

          echo "Rolling back $SERVICE in $VALUES_FILE to tag $TAG"

          yq -i ".$SERVICE.image.tag = \"$TAG\"" "$VALUES_FILE"

      - name: Commit rollback change
        run: |
          git config user.name "github-actions"
          git config user.email "github-actions@github.com"

          git add helm/cloudpulse/values-${{ github.event.inputs.environment }}.yaml
          git commit -m "rollback(${{ github.event.inputs.environment }}): ${{ github.event.inputs.service }} to ${{ github.event.inputs.image_tag }}" || echo "No changes to commit"
          git push